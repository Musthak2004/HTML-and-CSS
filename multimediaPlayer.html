<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Multimedia Player</title>
  </head>
  <body>
    <h1>My Media Player</h1>

    <!-- First section: Audio -->
    <section>
      <h2>Audio Track</h2>
      <audio controls aria-label="Audio player for Sailing Away">
        <source
          src="https://cdn.freecodecamp.org/curriculum/js-music-player/sailing-away.mp3"
          type="audio/mpeg"
        />
      </audio>
    </section>

    <!-- Second section: Video -->
    <section>
      <h2>Video Player</h2>
      <video
        controls
        width="600"
        aria-label="Video player for Map Method tutorial"
      >
        <source
          src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4"
          type="video/mp4"
        />
        <track
          src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.vtt"
          kind="subtitles"
          srclang="en"
          label="English"
        />
      </video>
    </section>

    <!-- Third section: Transcript -->
    <section>
      <h2>Transcript</h2>
      <p>This is the transcript of the video explaining the map method.</p>
    </section>
  </body>
</html>
